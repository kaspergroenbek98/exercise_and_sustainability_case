name: dbt-docs

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dbt
        run: pip install "dbt-snowflake>=1.8,<1.12"

      - name: Write profiles.yml
        run: |
          mkdir -p $HOME/.dbt
          {
            echo "exercise_sustainability:"
            echo "  target: prod"
            echo "  outputs:"
            echo "    prod:"
            echo "      type: snowflake"
            echo "      account: ${{ secrets.SNOWFLAKE_ACCOUNT }}"
            echo "      user: ${{ secrets.SNOWFLAKE_USER }}"
            echo "      password: ${{ secrets.SNOWFLAKE_PASSWORD }}"
            echo "      role: PC_DBT_ROLE"
            echo "      warehouse: TRANSFORM_WH"
            echo "      database: ANALYTICS_PROD"
            echo "      schema: prod"
            echo "      threads: 4"
          } > $HOME/.dbt/profiles.yml
          echo "Generated profiles.yml:"
          cat $HOME/.dbt/profiles.yml

      - name: Generate docs
        working-directory: ./dbt
        run: |
          dbt deps
          dbt docs generate

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dbt/target
          publish_branch: gh-pages
